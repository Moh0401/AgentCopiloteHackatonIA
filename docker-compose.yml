services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pme_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pme_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d pme_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
